<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA</title>
    <!-- 引入 PptxGenJS 引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <!-- 引入美學字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+TC:wght@300;400;500;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text-main: #111111;
            --text-muted: #888888;
            --border: #eaeaea;
            --bg-opacity: 0.08; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Serif TC', serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh; display: flex; overflow: hidden;
        }

        /* --- 側邊欄 --- */
        .sidebar {
            width: 30%; min-width: 340px; background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 4rem 3rem; z-index: 10;
        }

        .brand { 
            font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 500; 
            letter-spacing: 12px; margin-bottom: 3rem; color: #111; text-align: center;
            position: relative; padding-bottom: 1.5rem;
        }
        .brand::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 40px; height: 1px; background-color: #d4d4d4;
        }

        .toolbar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 1.5rem; height: 36px;}
        
        .icon-toggle {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            background: transparent; border: 1px solid transparent; transition: all 0.3s ease;
            color: var(--text-muted);
        }
        .icon-toggle:hover { color: #111; background: #fafafa; border-color: #eee; }
        .icon-toggle.active-mode { color: #111; background: #f4f4f4; border-color: #e5e5e5; }
        .icon-toggle svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

        .editor-wrapper { flex: 1; position: relative; display: flex; flex-direction: column; margin-bottom: 2rem; border-top: 1px solid transparent; overflow: hidden; }
        #promptInput {
            flex: 1; font-size: 1.1rem; line-height: 2.2; color: var(--text-main); 
            background: transparent; outline: none; font-weight: 300; 
            font-family: 'Inter', 'Noto Serif TC', serif; overflow-y: auto; padding-right: 10px;
        }
        #promptInput:empty::before { content: attr(data-placeholder); color: #cccccc; font-family: 'Inter', sans-serif; font-weight: 200; letter-spacing: 2px; pointer-events: none; }
        
        #promptInput::-webkit-scrollbar { width: 4px; }
        #promptInput::-webkit-scrollbar-thumb { background: #dcdcdc; border-radius: 4px; }

        .page-break-line { display: flex; align-items: center; justify-content: center; margin: 25px 0; gap: 15px; color: #999; font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 4px; user-select: none; }
        .page-break-line::before, .page-break-line::after { content: ''; flex: 1; height: 1px; background: #ddd; }
        .page-break-line span { font-size: 0.6rem; color: #aaa; }

        .btn { background: linear-gradient(135deg, #111111 0%, #2b2b2b 100%); color: #fff; border: none; padding: 1.2rem; font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 500; letter-spacing: 6px; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 2px; flex-shrink: 0; }
        .btn:hover { background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); box-shadow: 0 8px 25px rgba(0,0,0,0.2); transform: translateY(-2px); }
        .btn:disabled { background: #f0f0f0; color: #aaa; box-shadow: none; transform: none; cursor: not-allowed; }

        /* --- 簡報主區 --- */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .presentation-wrapper {
            width: 85%; max-width: 1280px; aspect-ratio: 16 / 9; background: #ffffff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.02); 
            border: 1px solid rgba(0,0,0,0.05); position: relative; overflow: hidden;
            container-type: inline-size;
        }

        .slide {
            position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; 
            display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(12, 1fr); 
            gap: 2cqw; padding: 3cqw; box-sizing: border-box; overflow: hidden;
        }
        .slide.active { opacity: 1; pointer-events: auto; z-index: 5; }

        .slide > .bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; 
            opacity: var(--bg-opacity); z-index: 1; pointer-events: none; filter: grayscale(100%);
        }

        /* --- 文字盛放容器 --- */
        .text-content-wrapper {
            position: relative; z-index: 3; display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 0, 0, 0.05); padding: 3cqw 3.5cqw;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06); border-radius: 2px;
        }
        .text-content-wrapper::before, .text-content-wrapper::after { content: ''; position: absolute; width: 1.5cqw; height: 1.5cqw; border: 1px solid rgba(0,0,0,0.4); pointer-events: none; }
        .text-content-wrapper::before { top: 1cqw; left: 1cqw; border-right: none; border-bottom: none; }
        .text-content-wrapper::after { bottom: 1cqw; right: 1cqw; border-left: none; border-top: none; }

        /* 絕對靜態文字框：不允許滾動，透過變數自適應縮放 */
        .text-inner-scroll { 
            overflow: hidden; /* 強制不滾動 */
            width: 100%; 
            max-height: 100%; 
            display: flex; 
            flex-direction: column; 
            --text-scale: 1; /* 動態字體縮放變數 */
        }
        
        .text-inner-scroll h1, .text-inner-scroll h2, .text-inner-scroll p, .text-inner-scroll ul { 
            text-align: left; 
            word-break: break-word; 
            overflow-wrap: break-word; 
        }
        
        /* 加入 var(--text-scale) 達成 JS 無縫縮放 */
        .text-inner-scroll h1 { font-size: calc(clamp(2.8rem, 5cqw, 4rem) * var(--text-scale)); line-height: 1.2; font-weight: 500; color: #111; margin-bottom: 0.5rem;}
        .text-inner-scroll h2 { font-size: calc(clamp(1.8rem, 3.1cqw, 2.5rem) * var(--text-scale)); font-weight: 400; color: #666; letter-spacing: 4px;}
        .text-inner-scroll p, .text-inner-scroll ul { font-size: calc(clamp(1.3rem, 2.25cqw, 1.8rem) * var(--text-scale)); line-height: 2.1; color: #333; margin-top: 1rem; font-weight: 300; letter-spacing: 1px; }
        .text-inner-scroll:not(:has(h1)):not(:has(h2)) p { margin-top: 0; margin-bottom: 0; }

        /* --- 藝術圖片外框 --- */
        .feature-img-wrapper { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .art-frame { position: relative; padding: 0.8cqw; background: #ffffff; border: 1px solid #eee; box-shadow: 0 15px 45px rgba(0,0,0,0.1); max-width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;}
        .art-frame::before { content: ''; position: absolute; inset: 0.4cqw; border: 1px solid rgba(0,0,0,0.06); pointer-events: none; }
        .art-frame img { display: block; width: 100%; height: 100%; object-fit: cover; }

        /* --- 6種靈活佈局 --- */
        .layout-img-left .feature-img-wrapper { grid-area: 2 / 1 / 12 / 6; }
        .layout-img-left .text-content-wrapper { grid-area: 3 / 6 / 11 / 13; }
        .layout-img-right .text-content-wrapper { grid-area: 3 / 1 / 11 / 8; }
        .layout-img-right .feature-img-wrapper { grid-area: 2 / 8 / 12 / 13; }
        .layout-overlap-left .feature-img-wrapper { grid-area: 1 / 4 / 13 / 13; }
        .layout-overlap-left .text-content-wrapper { grid-area: 4 / 1 / 10 / 7; z-index: 4; }
        .layout-overlap-right .feature-img-wrapper { grid-area: 1 / 1 / 13 / 10; }
        .layout-overlap-right .text-content-wrapper { grid-area: 5 / 7 / 11 / 13; z-index: 4; }
        .layout-center .text-content-wrapper { grid-area: 3 / 2 / 11 / 12; align-items: flex-start; justify-content: center;}
        .layout-center .feature-img-wrapper { display: none; }
        .layout-bottom-text .feature-img-wrapper { grid-area: 1 / 3 / 8 / 11; }
        .layout-bottom-text .text-content-wrapper { grid-area: 8 / 2 / 13 / 12; flex-direction: column; align-items: flex-start; justify-content: center; padding: 2cqw 4cqw;}
        .layout-bottom-text .text-inner-scroll p { margin-top: 0; }

        .slide-number-indicator { position: absolute; bottom: 2cqw; right: 3cqw; font-size: 1.2cqw; font-family: 'Cinzel', serif; color: #999; letter-spacing: 0.2cqw; z-index: 5; pointer-events: none; }

        /* --- UI --- */
        .controls-container { position: absolute; bottom: 2.5rem; display: flex; align-items: center; gap: 2rem; }
        .icon-btn { background: transparent; border: none; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; color: #aaa; }
        .icon-btn:hover { color: #111; }
        .icon-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1; }
        .slide-counter { font-size: 0.8rem; font-family: 'Inter', sans-serif; font-weight: 300; color: #888; font-variant-numeric: tabular-nums; letter-spacing: 1px;}
        .empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; opacity: 0.15;}
        .empty-state svg { width: 100px; height: 100px; stroke: #111; stroke-width: 0.5; fill: none; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 0.5; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } }
        .action-bar { position: absolute; top: 2rem; right: 2.5rem; display: flex; align-items: center; gap: 15px; }
        .btn-export { background: #fff; border: 1px solid #ddd; padding: 6px 12px; font-size: 0.75rem; font-family: 'Cinzel', serif; letter-spacing: 2px; cursor: pointer; transition: 0.2s; color: #666; border-radius: 4px; }
        .btn-export:hover { border-color: #111; color: #111; }
        .opacity-control { display: flex; align-items: center; gap: 8px; border-right: 1px solid #eee; padding-right: 15px;}
        .opacity-control svg { width: 14px; height: 14px; color: #999; }
        input[type=range] { -webkit-appearance: none; width: 60px; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #ddd; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 10px; border-radius: 50%; background: #666; margin-top: -4px; transition: 0.2s; }
        input[type=range]:hover::-webkit-slider-thumb { background: #111; transform: scale(1.2); }

        /* --- Loader --- */
        .fullscreen-loader {
            position: fixed; inset: 0; z-index: 9999; background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2rem;
            opacity: 0; visibility: hidden; transition: opacity 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), visibility 0.8s;
        }
        .fullscreen-loader.active { opacity: 1; visibility: visible; }
        .cinematic-ring { width: 60px; height: 60px; border: 1px solid rgba(0,0,0,0.05); border-top: 1px solid #111; border-radius: 50%; animation: slowSpin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite; }
        .loading-text-stage { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; font-weight: 300; letter-spacing: 4px; color: #333; animation: pulseText 2s infinite; }
        @keyframes slowSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseText { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="fullscreen-loader" id="fullscreenLoader">
        <div class="cinematic-ring"></div>
        <div class="loading-text-stage" id="loadingStageText">提煉文學脈絡...</div>
    </div>

    <div class="sidebar">
        <div class="brand">AURA</div>
        <div class="toolbar">
            <div class="icon-toggle" id="pageBreakBtn" title="插入圖形分頁標記 (強制從此處分頁)"><svg viewBox="0 0 24 24"><path d="M5 12h14M8 7l-3 5 3 5m8-10l3 5-3 5" stroke-width="2"></path></svg></div>
            <div class="icon-toggle active-mode" id="titleToggle" style="display: flex;" title="開啟/關閉自動產生標題">
                <svg id="icon-title-on" viewBox="0 0 24 24" style="display: none;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="7" y1="8" x2="17" y2="8" stroke-width="2.5"></line><line x1="7" y1="13" x2="17" y2="13"></line><line x1="7" y1="17" x2="13" y2="17"></line></svg>
                <svg id="icon-title-off" viewBox="0 0 24 24" style="display: block;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="7" y1="9" x2="17" y2="9"></line><line x1="7" y1="13" x2="17" y2="13"></line><line x1="7" y1="17" x2="13" y2="17"></line></svg>
            </div>
            <div class="icon-toggle" id="modeToggle" title="切換 AI智慧排版 / 嚴格一字不易">
                <svg id="icon-magic" viewBox="0 0 24 24" style="display:none;"><path d="M21 16.052v-.004A9.965 9.965 0 0022 12c0-5.523-4.477-10-10-10S2 6.477 2 12s4.477 10 10 10c1.72 0 3.336-.434 4.757-1.189l4.53 1.51-1.34-4.269zM12 7v10M7 12h10"/></svg>
                <svg id="icon-lock" viewBox="0 0 24 24" style="display:block;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
        </div>
        <div class="editor-wrapper"><div id="promptInput" contenteditable="true" data-placeholder="輸入需排版的原文或段落...也可以點擊上方按鍵插入分頁。"></div></div>
        <button id="generateBtn" class="btn">GENERATE</button>
    </div>

    <div class="main-content">
        <div class="action-bar" id="actionBar" style="display: none;">
            <div class="opacity-control" title="調整背景濃度">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20v-20z" fill="currentColor" opacity="0.3"/></svg>
                <input type="range" id="opacitySlider" min="0" max="100" value="20">
            </div>
            <button id="btnExportHtml" class="btn-export">HTML</button>
            <button id="btnExportPptx" class="btn-export">PPTX</button>
        </div>

        <div class="presentation-wrapper" id="presentationBoard">
            <div class="empty-state"><svg viewBox="0 0 100 100"><rect x="15" y="25" width="70" height="50" rx="1" ry="1"></rect><line x1="25" y1="40" x2="60" y2="40"></line><line x1="25" y1="50" x2="75" y2="50"></line><line x1="25" y1="60" x2="50" y2="60"></line></svg></div>
        </div>

        <div class="controls-container" id="controls" style="display: none;">
            <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
            <div class="slide-counter"><span id="currentSlideNum">0</span> / <span id="totalSlideNum">0</span></div>
            <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        </div>
    </div>

    <script>
        const API_KEYS = ["pk_eFlNmo9v1lXOC6Zw"];
        const API_URL = "https://gen.pollinations.ai/v1/chat/completions";
        const MODEL = "gemini-search";

        const generateBtn = document.getElementById('generateBtn');
        const promptInput = document.getElementById('promptInput');
        const presentationBoard = document.getElementById('presentationBoard');
        const controls = document.getElementById('controls');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentSlideNum = document.getElementById('currentSlideNum');
        const totalSlideNum = document.getElementById('totalSlideNum');
        const actionBar = document.getElementById('actionBar');
        const opacitySlider = document.getElementById('opacitySlider');
        const pageBreakBtn = document.getElementById('pageBreakBtn');
        const loaderScreen = document.getElementById('fullscreenLoader');
        const loaderStageText = document.getElementById('loadingStageText');
        
        let isAiMode = false, useTitleInStrict = false, slides = [], currentIndex = 0;
        let usedQueries = new Set(); 
        
        // 攝影意境修改詞庫 (用於強制改變 Bing 搜尋結果)
        const photoStyles = ["光影", "構圖", "特寫", "遠景", "虛化", "色彩", "黑白", "靜物", "幾何", "對比", "極簡", "氛圍", "質感", "視角", "留白"];

        opacitySlider.addEventListener('input', (e) => document.documentElement.style.setProperty('--bg-opacity', (0.02 + (e.target.value / 100) * 0.23).toFixed(3)));
        document.getElementById('modeToggle').addEventListener('click', function() { isAiMode = !isAiMode; document.getElementById('icon-magic').style.display = isAiMode ? "block" : "none"; document.getElementById('icon-lock').style.display = isAiMode ? "none" : "block"; isAiMode ? this.classList.add('active-mode') : this.classList.remove('active-mode'); });
        document.getElementById('titleToggle').addEventListener('click', function() { useTitleInStrict = !useTitleInStrict; document.getElementById('icon-title-on').style.display = useTitleInStrict ? "block" : "none"; document.getElementById('icon-title-off').style.display = useTitleInStrict ? "none" : "block"; useTitleInStrict ? this.classList.remove('active-mode') : this.classList.add('active-mode'); });
        pageBreakBtn.addEventListener('mousedown', (e) => e.preventDefault());
        pageBreakBtn.addEventListener('click', () => {
            promptInput.focus(); const selection = window.getSelection();
            if (selection.rangeCount > 0 && promptInput.contains(selection.anchorNode)) {
                const range = selection.getRangeAt(0); range.deleteContents();
                const markerDiv = document.createElement('div'); markerDiv.className = 'page-break-line'; markerDiv.contentEditable = 'false'; markerDiv.innerHTML = '<span>✦</span> 分頁標記 <span>✦</span>';
                const brDiv = document.createElement('div'); brDiv.innerHTML = '<br>';
                range.insertNode(brDiv); range.insertNode(markerDiv); range.setStart(brDiv, 0); range.collapse(true); selection.removeAllRanges(); selection.addRange(range); markerDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else { promptInput.insertAdjacentHTML('beforeend', `<div class="page-break-line" contenteditable="false"><span>✦</span> 分頁標記 <span>✦</span></div><div><br></div>`); promptInput.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        });

        function splitIntoChunks(text, maxLength = 95) {
            const sentences = text.split(/([。！？.!?\n])/); let merged = [];
            for (let i = 0; i < sentences.length; i += 2) { let s = sentences[i], punc = sentences[i + 1] || ""; if (s + punc) merged.push(s + punc); }
            let chunks = [], cur = "";
            for (let s of merged) { s = s.trim(); if (!s) continue; if (cur.length + s.length <= maxLength) cur += (cur ? " " : "") + s; else { if (cur) chunks.push(cur); cur = s; } }
            if (cur) chunks.push(cur); return chunks;
        }

        // 強制改變搜尋關鍵字以確保 Bing 絕對不重複
        function getImageUrl(main, snippet, idx) {
            let cleanMain = (main || "藝術").replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s]/g, ' ').trim().substring(0, 15);
            let cleanSnip = (snippet && snippet.length > 2) ? snippet.replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s]/g, ' ').trim().substring(0, 15) : "";
            let baseQuery = cleanMain; 
            if (cleanSnip && !cleanMain.includes(cleanSnip)) baseQuery = `${cleanMain} ${cleanSnip}`;
            
            // 加入意境修飾詞，強制每一頁的搜尋字串都不一樣
            let styleModifier = photoStyles[idx % photoStyles.length];
            let finalQuery = `${baseQuery} 攝影 ${styleModifier} -字`;

            // 雙重保險：如果這個完全一樣的搜尋字串真的用過了，就再疊加頁碼破壞字串結構
            while (usedQueries.has(finalQuery)) {
                let randomStyle = photoStyles[Math.floor(Math.random() * photoStyles.length)];
                finalQuery = `${baseQuery} 攝影 ${randomStyle} 幻境 ${idx} -字`;
            }
            usedQueries.add(finalQuery);

            let cacheBuster = Date.now() + idx; 
            return `https://tse${(idx % 4) + 1}.mm.bing.net/th?q=${encodeURIComponent(finalQuery)}&w=1200&h=1200&c=7&rs=1&pid=Api&mkt=zh-TW&nocache=${cacheBuster}`;
        }

        // 文字自適應縮放引擎：確保長文字不會超出框框，無須滾動
        function autoFitText() {
            const wrappers = document.querySelectorAll('.text-inner-scroll');
            wrappers.forEach(wrapper => {
                let scale = 1.0;
                wrapper.style.setProperty('--text-scale', scale);
                
                // 檢查如果內容超出容器，就逐步縮小字體比例 (最低縮到 40%)
                while (wrapper.scrollHeight > wrapper.clientHeight && scale > 0.4) {
                    scale -= 0.05;
                    wrapper.style.setProperty('--text-scale', scale);
                }
            });
        }

        // 監聽視窗縮放，確保響應式排版隨時完美
        window.addEventListener('resize', () => {
            if (slides.length > 0) autoFitText();
        });

        function showLoader(text) { loaderStageText.innerText = text; loaderScreen.classList.add('active'); }
        function hideLoader() { loaderScreen.classList.remove('active'); }

        generateBtn.addEventListener('click', async () => {
            const rawHTML = promptInput.innerHTML.trim(); if (!promptInput.innerText.trim() && !rawHTML) return;
            generateBtn.disabled = true; showLoader("提煉文學脈絡..."); controls.style.display = "none"; actionBar.style.display = "none";
            
            usedQueries.clear(); // 每次生成清空搜尋紀錄

            await new Promise(r => setTimeout(r, 600));

            try {
                let finalHtml = "", chunks = [], topic = "藝術排版";
                if (rawHTML.includes('page-break-line')) {
                    const parts = rawHTML.split(/<div class="page-break-line".*?<\/div>/gi);
                    const temp = document.createElement('div');
                    parts.forEach(p => { temp.innerHTML = p.replace(/<br\s*\/?>/gi, '\n'); let t = temp.innerText.trim(); if (t) chunks.push(...splitIntoChunks(t, 95)); });
                } else chunks = splitIntoChunks(promptInput.innerText.trim(), 95);

                if(chunks.length > 0) topic = chunks[0].substring(0, 15).replace(/\n/g, ' ');

                if (!isAiMode) {
                    if (!useTitleInStrict) { finalHtml = chunks.map(c => `<div class="slide"><p>${c.replace(/\n/g, '<br>')}</p></div>`).join("\n"); } 
                    else {
                        showLoader("構築排版意境標題...");
                        const prompt = `為以下${chunks.length}段落產生極短的繁體中文標題(不超過8個字)。只輸出JSON陣列，如:["標一","標二"]`;
                        try {
                            const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEYS[0]}` }, body: JSON.stringify({ model: MODEL, messages: [ { role: "system", content: prompt }, { role: "user", content: chunks.map((c,i)=>`[段${i+1}] ${c}`).join("\n") } ] }) });
                            const data = await res.json(); let titles = JSON.parse(data.choices[0].message.content.replace(/```json/gi, '').replace(/```/gi, '').trim());
                            while(titles.length < chunks.length) titles.push(topic);
                            finalHtml = chunks.map((c, i) => `<div class="slide"><h2>${titles[i]}</h2><p>${c.replace(/\n/g, '<br>')}</p></div>`).join("\n");
                        } catch(e) { finalHtml = chunks.map((c, i) => `<div class="slide"><h2>章節 ${i+1}</h2><p>${c.replace(/\n/g, '<br>')}</p></div>`).join("\n"); }
                    }
                } else {
                    showLoader("AI 解構與網格重組...");
                    let tempDiv = document.createElement('div'); tempDiv.innerHTML = promptInput.innerHTML;
                    tempDiv.querySelectorAll('.page-break-line').forEach(el => el.innerText = '\n\n[MANUAL_PAGE_BREAK]\n\n');
                    const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEYS[0]}` }, body: JSON.stringify({ model: MODEL, messages: [ { role: "system", content: `You are a designer. Output ONLY HTML. RULES: 1. Traditional Chinese 2. Start new slide at [MANUAL_PAGE_BREAK]. If text too long, split to slides. 3. Format: <div class="slide"><h2>[Subtitle]</h2><p>[Text]</p></div>` }, { role: "user", content: tempDiv.innerText } ] }) });
                    finalHtml = (await res.json()).choices[0].message.content.replace(/```html/gi, '').replace(/```/gi, '').trim();
                }

                showLoader("渲染最終視覺意境...");
                await new Promise(r => setTimeout(r, 600));
                renderPresentation(finalHtml, topic);

                // 在渲染完成並掛載到 DOM 後，執行文字自適應縮放
                setTimeout(autoFitText, 100);

            } catch (error) { presentationBoard.innerHTML = `<div class="empty-state"><p>發生錯誤，請稍後再試</p></div>`; } 
            finally { hideLoader(); generateBtn.disabled = false; }
        });

        const layouts = ['layout-img-right', 'layout-overlap-left', 'layout-center', 'layout-img-left', 'layout-bottom-text', 'layout-overlap-right'];

        function renderPresentation(htmlContent, mainTopic) {
            const tempDiv = document.createElement('div'); tempDiv.innerHTML = htmlContent;
            presentationBoard.innerHTML = '';
            const rawSlides = tempDiv.querySelectorAll('.slide');

            rawSlides.forEach((slide, index) => {
                const newSlide = document.createElement('div');
                const assignedLayout = layouts[index % layouts.length];
                newSlide.className = `slide ${assignedLayout}`;

                const bgImg = document.createElement('img'); bgImg.className = 'bg-img';
                bgImg.crossOrigin = "Anonymous"; bgImg.src = `https://picsum.photos/seed/${Math.floor(Math.random() * 99999)}/1600/900`;
                newSlide.appendChild(bgImg);

                const textWrapper = document.createElement('div'); textWrapper.className = 'text-content-wrapper';
                const scrollArea = document.createElement('div'); scrollArea.className = 'text-inner-scroll';

                ['h1', 'h2', 'p', 'ul'].forEach(tag => {
                    const el = slide.querySelector(tag); if(el) scrollArea.appendChild(el.cloneNode(true));
                });
                textWrapper.appendChild(scrollArea); newSlide.appendChild(textWrapper);

                if (assignedLayout !== 'layout-center') {
                    const p = slide.querySelector('p');
                    const imgWrapper = document.createElement('div'); imgWrapper.className = 'feature-img-wrapper';
                    const artFrame = document.createElement('div'); artFrame.className = 'art-frame';
                    const featureImg = document.createElement('img'); featureImg.crossOrigin = "anonymous";
                    // 永遠調用 getImageUrl，裡面確保使用 Bing API 並強制修改子關鍵字防重複
                    featureImg.src = getImageUrl(mainTopic, p ? p.innerText : "", index);
                    artFrame.appendChild(featureImg); imgWrapper.appendChild(artFrame); newSlide.appendChild(imgWrapper);
                }

                const pageNum = document.createElement('div'); pageNum.className = 'slide-number-indicator'; pageNum.innerText = String(index + 1).padStart(2, '0');
                newSlide.appendChild(pageNum); presentationBoard.appendChild(newSlide);
            });

            slides = document.querySelectorAll('.slide'); if (slides.length === 0) return;
            currentIndex = 0; updateSlides(); controls.style.display = "flex"; actionBar.style.display = "flex"; totalSlideNum.innerText = slides.length;
        }

        function updateSlides() { slides.forEach((s, i) => s.classList.toggle('active', i === currentIndex)); currentSlideNum.innerText = currentIndex + 1; }
        prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; updateSlides(); } });
        nextBtn.addEventListener('click', () => { if (currentIndex < slides.length - 1) { currentIndex++; updateSlides(); } });
        document.addEventListener('keydown', (e) => { if (slides.length === 0) return; if (e.key === 'ArrowRight' && currentIndex < slides.length - 1) { currentIndex++; updateSlides(); } if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; updateSlides(); } });

        // --- 匯出 HTML (同步加入自適應縮放引擎) ---
        document.getElementById('btnExportHtml').addEventListener('click', () => {
            const currentOpacity = getComputedStyle(document.documentElement).getPropertyValue('--bg-opacity').trim();
            const slideHtml = Array.from(slides).map(s => s.outerHTML).join('\n');
            const exportHtml = `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>AURA Presentation</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Noto+Serif+TC:wght@300;400;500;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet"><style>body { font-family: 'Inter', 'Noto Serif TC', serif; margin: 0; background: #000; display:flex; justify-content:center; align-items:center; height:100vh; overflow: hidden; }.wrapper { width: 100vw; max-width: 1920px; aspect-ratio: 16/9; position: relative; container-type: inline-size; background:#fff; overflow:hidden; }.slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(12, 1fr); gap: 2cqw; padding: 3cqw; box-sizing: border-box; overflow: hidden; }.slide.active { opacity: 1; z-index: 10; }.bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: ${currentOpacity}; filter: grayscale(100%); z-index: 1; }.text-content-wrapper { position: relative; z-index: 3; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(0, 0, 0, 0.05); padding: 3cqw 3.5cqw; box-shadow: 0 15px 40px rgba(0,0,0,0.06); }.text-content-wrapper::before, .text-content-wrapper::after { content: ''; position: absolute; width: 1.5cqw; height: 1.5cqw; border: 1px solid rgba(0,0,0,0.4); }.text-content-wrapper::before { top: 1cqw; left: 1cqw; border-right: none; border-bottom: none; }.text-content-wrapper::after { bottom: 1cqw; right: 1cqw; border-left: none; border-top: none; }.text-inner-scroll { overflow: hidden; width: 100%; max-height: 100%; display: flex; flex-direction: column; --text-scale: 1; }h1, h2, p, ul { margin: 0; text-align: left; word-break: break-word; overflow-wrap: break-word; }h1 { font-size: calc(clamp(3rem, 5cqw, 4.5rem) * var(--text-scale)); font-weight: 500; color: #111; margin-bottom: 0.5rem;}h2 { font-size: calc(clamp(2rem, 3.1cqw, 3rem) * var(--text-scale)); font-weight: 400; color: #666; letter-spacing: 4px;}p, ul { font-size: calc(clamp(1.4rem, 2.25cqw, 1.8rem) * var(--text-scale)); line-height: 2.1; color: #333; margin-top: 1rem; font-weight: 300; letter-spacing: 1px; }.feature-img-wrapper { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }.art-frame { position: relative; padding: 0.8cqw; background: #fff; border: 1px solid #eee; box-shadow: 0 15px 45px rgba(0,0,0,0.1); width: 100%; height: 100%; display:flex; justify-content:center; align-items:center; }.art-frame::before { content: ''; position: absolute; inset: 0.4cqw; border: 1px solid rgba(0,0,0,0.06); }.art-frame img { display: block; width: 100%; height: 100%; object-fit: cover; }.layout-img-left .feature-img-wrapper { grid-area: 2 / 1 / 12 / 6; }.layout-img-left .text-content-wrapper { grid-area: 3 / 6 / 11 / 13; }.layout-img-right .text-content-wrapper { grid-area: 3 / 1 / 11 / 8; }.layout-img-right .feature-img-wrapper { grid-area: 2 / 8 / 12 / 13; }.layout-overlap-left .feature-img-wrapper { grid-area: 1 / 4 / 13 / 13; }.layout-overlap-left .text-content-wrapper { grid-area: 4 / 1 / 10 / 7; z-index: 4; }.layout-overlap-right .feature-img-wrapper { grid-area: 1 / 1 / 13 / 10; }.layout-overlap-right .text-content-wrapper { grid-area: 5 / 7 / 11 / 13; z-index: 4; }.layout-center .text-content-wrapper { grid-area: 3 / 2 / 11 / 12; align-items: flex-start; justify-content: center;}.layout-center .feature-img-wrapper { display: none; }.layout-bottom-text .feature-img-wrapper { grid-area: 1 / 3 / 8 / 11; }.layout-bottom-text .text-content-wrapper { grid-area: 8 / 2 / 13 / 12; flex-direction: column; align-items: flex-start; justify-content: center; padding: 2cqw 4cqw;}.layout-bottom-text p { margin-top: 0; }.slide-number-indicator { position: absolute; bottom: 2cqw; right: 3cqw; font-size: 1.2cqw; font-family: 'Cinzel', serif; color: #999; letter-spacing: 0.2cqw; z-index: 5; }.ui-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; align-items: center; gap: 20px; }.icon-btn { background: transparent; border: none; width: 40px; height: 40px; cursor: pointer; color: #aaa; transition: 0.2s;}.icon-btn:hover { color: #fff; } .icon-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1; }.counter { font-size: 0.85rem; font-family: 'Inter', sans-serif; color: #888; letter-spacing: 1px;}</style></head><body><div class="wrapper" id="board">${slideHtml}</div><div class="ui-bar"><button class="icon-btn" id="btn-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></button><div class="counter"><span id="num-curr">1</span> / <span id="num-tot">0</span></div><button class="icon-btn" id="btn-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></button></div><script>const slides = document.querySelectorAll('.slide'); const currEl = document.getElementById('num-curr'); document.getElementById('num-tot').innerText = slides.length; let c = 0; function update() { slides.forEach((s, i) => s.classList.toggle('active', i === c)); currEl.innerText = c + 1; } if(slides.length > 0) update(); document.getElementById('btn-prev').addEventListener('click', () => { if(c > 0) { c--; update(); }}); document.getElementById('btn-next').addEventListener('click', () => { if(c < slides.length - 1) { c++; update(); }}); document.addEventListener('keydown', (e) => { if(e.key === 'ArrowRight' && c < slides.length - 1) { c++; update(); } if(e.key === 'ArrowLeft' && c > 0) { c--; update(); }}); function autoFit() { document.querySelectorAll('.text-inner-scroll').forEach(w => { let s = 1.0; w.style.setProperty('--text-scale', s); while (w.scrollHeight > w.clientHeight && s > 0.4) { s -= 0.05; w.style.setProperty('--text-scale', s); } }); } setTimeout(autoFit, 100); window.addEventListener('resize', autoFit);<\/script></body></html>`;
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([exportHtml], { type: 'text/html' })); a.download = 'AURA_Presentation.html'; a.click();
        });

        // --- 匯出 PPTX ---
        document.getElementById('btnExportPptx').addEventListener('click', () => {
            if(typeof PptxGenJS === 'undefined') { alert("PPT 引擎載入中，請稍後再試。"); return; }
            let pres = new PptxGenJS(); pres.layout = 'LAYOUT_16x9';
            const font = 'Noto Serif TC';
            const pptxTransparency = 100 - (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--bg-opacity').trim()) * 100);

            slides.forEach((slide, index) => {
                let pptSlide = pres.addSlide();
                let bgImg = slide.querySelector('.bg-img');
                if (bgImg) pptSlide.addImage({ path: bgImg.src, x: 0, y: 0, w: '100%', h: '100%', transparency: pptxTransparency }); 
                
                let cList = slide.classList;
                let boxX=0, boxY=0, boxW=0, boxH=0, imgX=0, imgY=0, imgW=0, imgH=0;
                let hasImg = !cList.contains('layout-center');

                if (cList.contains('layout-img-left')) { imgX=0.5; imgY=0.6; imgW=3.5; imgH=4.4; boxX=4.5; boxY=1.0; boxW=5.0; boxH=3.6; } 
                else if (cList.contains('layout-img-right')) { boxX=0.5; boxY=1.0; boxW=5.0; boxH=3.6; imgX=6.0; imgY=0.6; imgW=3.5; imgH=4.4; } 
                else if (cList.contains('layout-overlap-left')) { imgX=2.8; imgY=0.3; imgW=6.9; imgH=5.0; boxX=0.5; boxY=1.5; boxW=4.5; boxH=2.6; } 
                else if (cList.contains('layout-overlap-right')) { imgX=0.3; imgY=0.3; imgW=6.9; imgH=5.0; boxX=5.0; boxY=2.0; boxW=4.5; boxH=2.6; } 
                else if (cList.contains('layout-bottom-text')) { imgX=2.0; imgY=0.3; imgW=6.0; imgH=3.2; boxX=1.0; boxY=3.8; boxW=8.0; boxH=1.5; } 
                else if (cList.contains('layout-center')) { boxX=2.0; boxY=1.5; boxW=6.0; boxH=2.6; } 

                if (hasImg) {
                    pptSlide.addShape(pres.ShapeType.rect, { x: imgX, y: imgY, w: imgW, h: imgH, fill: { color: 'FFFFFF' }, shadow: { type: 'outer', opacity: 0.15, blur: 5 }});
                    let featureImg = slide.querySelector('.feature-img-wrapper img');
                    if (featureImg) try { pptSlide.addImage({ path: featureImg.src, x: imgX+0.1, y: imgY+0.1, sizing: { type: 'cover', w: imgW-0.2, h: imgH-0.2 } }); } catch(e){}
                }

                pptSlide.addShape(pres.ShapeType.rect, { x: boxX, y: boxY, w: boxW, h: boxH, fill: { color: 'FFFFFF', transparency: 10 }, shadow: { type: 'outer', opacity: 0.08, blur: 10 } });
                let cLen = 0.2; 
                pptSlide.addShape(pres.ShapeType.line, { x: boxX+0.15, y: boxY+0.15, w: cLen, h: 0, line: { color: '444444', width: 1.5 } });
                pptSlide.addShape(pres.ShapeType.line, { x: boxX+0.15, y: boxY+0.15, w: 0, h: cLen, line: { color: '444444', width: 1.5 } });
                pptSlide.addShape(pres.ShapeType.line, { x: boxX+boxW-0.15-cLen, y: boxY+boxH-0.15, w: cLen, h: 0, line: { color: '444444', width: 1.5 } });
                pptSlide.addShape(pres.ShapeType.line, { x: boxX+boxW-0.15, y: boxY+boxH-0.15-cLen, w: 0, h: cLen, line: { color: '444444', width: 1.5 } });

                let h1 = slide.querySelector('h1'), h2 = slide.querySelector('h2'), p = slide.querySelector('p');
                let curY = boxY + 0.4, txtW = boxW - 0.8, txtX = boxX + 0.4;
                
                if(h1) { pptSlide.addText(h1.innerText, { x: txtX, y: curY, w: txtW, h:0.6, align: 'left', fontFace: font, fontSize: 36, color: '111111' }); curY += 0.7; }
                if(h2) { pptSlide.addText(h2.innerText, { x: txtX, y: curY, w: txtW, h:0.4, align: 'left', fontFace: font, fontSize: 24, color: '666666' }); curY += 0.5; }
                if(p) { pptSlide.addText(p.innerText, { x: txtX, y: curY, w: txtW, h: (boxY+boxH)-curY-0.2, align: 'left', valign: 'top', fontFace: font, fontSize: 16, color: '333333', lineSpacing: 25 }); }

                pptSlide.addText(String(index + 1).padStart(2, '0'), { x: 9.0, y: 5.1, w: 0.8, h: 0.4, align: 'right', fontFace: 'Cinzel', fontSize: 16, color: '999999' });
            });
            pres.writeFile({ fileName: "AURA_Presentation.pptx" });
        });
    </script>
</body>
