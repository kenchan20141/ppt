<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA</title>
    <!-- 引入 PptxGenJS 引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <!-- 引入美學字體：Cinzel(英文字體藝術)、Noto Serif TC(高級思源宋體)、Inter(數字與介面無襯線) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+TC:wght@300;400;500;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text-main: #111111;
            --text-muted: #888888;
            --border: #eaeaea;
            --bg-opacity: 0.08; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Serif TC', serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh; display: flex; overflow: hidden;
        }

        /* --- 側邊欄 --- */
        .sidebar {
            width: 30%; min-width: 340px; background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 4rem 3rem; z-index: 10;
        }

        .brand { 
            font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 500; 
            letter-spacing: 12px; margin-bottom: 3rem; color: #111; text-align: center;
            position: relative; padding-bottom: 1.5rem;
        }
        .brand::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 40px; height: 1px; background-color: #d4d4d4;
        }

        .toolbar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 1.5rem; height: 36px;}
        
        .icon-toggle {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            background: transparent; border: 1px solid transparent; transition: all 0.3s ease;
            color: var(--text-muted);
        }
        .icon-toggle:hover { color: #111; background: #fafafa; border-color: #eee; }
        .icon-toggle.active-mode { color: #111; background: #f4f4f4; border-color: #e5e5e5; }
        .icon-toggle svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

        .editor-wrapper {
            flex: 1; position: relative; display: flex; flex-direction: column; margin-bottom: 2rem;
            border-top: 1px solid transparent; overflow: hidden;
        }
        #promptInput {
            flex: 1; font-size: 1.1rem; line-height: 2; color: var(--text-main); 
            background: transparent; outline: none; font-weight: 300; 
            font-family: 'Inter', 'Noto Serif TC', serif; overflow-y: auto; padding-right: 10px;
        }
        #promptInput:empty::before {
            content: attr(data-placeholder); color: #cccccc; font-family: 'Inter', sans-serif; 
            font-weight: 200; letter-spacing: 2px; pointer-events: none;
        }
        #promptInput::-webkit-scrollbar, .text-inner-scroll::-webkit-scrollbar { width: 4px; }
        #promptInput::-webkit-scrollbar-thumb, .text-inner-scroll::-webkit-scrollbar-thumb { background: #dcdcdc; border-radius: 4px; }

        /* 圖形化分頁標記設計 */
        .page-break-line {
            display: flex; align-items: center; justify-content: center; margin: 25px 0;
            gap: 15px; color: #999; font-family: 'Cinzel', serif; font-size: 0.75rem; 
            letter-spacing: 4px; user-select: none;
        }
        .page-break-line::before, .page-break-line::after { content: ''; flex: 1; height: 1px; background: #ddd; }
        .page-break-line span { font-size: 0.6rem; color: #aaa; }

        .btn {
            background: linear-gradient(135deg, #111111 0%, #2b2b2b 100%); color: #fff; border: none; padding: 1.2rem;
            font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 500; letter-spacing: 6px; 
            cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 2px; flex-shrink: 0;
        }
        .btn:hover { background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); box-shadow: 0 8px 25px rgba(0,0,0,0.2); transform: translateY(-2px); }
        .btn:disabled { background: #f0f0f0; color: #aaa; box-shadow: none; transform: none; cursor: not-allowed; }

        /* --- 簡報主區 --- */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .presentation-wrapper {
            width: 85%; max-width: 1280px; aspect-ratio: 16 / 9; background: #ffffff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.02); 
            border: 1px solid rgba(0,0,0,0.05); position: relative; overflow: hidden;
        }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0;
            pointer-events: none; transition: opacity 0.8s ease; display: grid; 
            grid-template-columns: repeat(12, 1fr); align-items: center; /* 確保內容垂直置中 */
            gap: 2vw; padding: 4vw 5vw; box-sizing: border-box; overflow: hidden;
        }
        .slide.active { opacity: 1; pointer-events: auto; z-index: 5; }

        .slide > .bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; 
            opacity: var(--bg-opacity); z-index: 1; pointer-events: none; filter: grayscale(100%);
        }

        /* --- 文字盛放容器 (Text Receptacle) --- */
        .text-content-wrapper {
            position: relative; z-index: 2; width: 100%; 
            max-height: 70vh; height: fit-content; align-self: center; 
            background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 0, 0, 0.06); padding: 3vw 3.5vw;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05); border-radius: 2px;
            display: flex; flex-direction: column;
        }
        .text-content-wrapper::before, .text-content-wrapper::after {
            content: ''; position: absolute; width: 15px; height: 15px; border: 1px solid rgba(0,0,0,0.3); pointer-events: none;
        }
        .text-content-wrapper::before { top: 12px; left: 12px; border-right: none; border-bottom: none; }
        .text-content-wrapper::after { bottom: 12px; right: 12px; border-left: none; border-top: none; }

        .text-inner-scroll { overflow-y: auto; padding-right: 15px; width: 100%; display: flex; flex-direction: column; }
        .text-inner-scroll h1, .text-inner-scroll h2 { margin: 0; word-break: keep-all; text-align: left; }
        .text-inner-scroll h1 { font-size: clamp(2.8rem, 4.5vw, 4rem); line-height: 1.2; font-weight: 500; color: #111; margin-bottom: 0.5rem;}
        .text-inner-scroll h2 { font-size: clamp(1.8rem, 2.5vw, 2.5rem); font-weight: 400; color: #666; letter-spacing: 4px;}
        .text-inner-scroll p, .text-inner-scroll ul { 
            font-size: clamp(1.3rem, 1.8vw, 1.8rem); line-height: 2.1; color: #333; 
            margin-top: 1rem; font-weight: 300; text-align: left; letter-spacing: 1px;
        }
        .text-inner-scroll:not(:has(h1)):not(:has(h2)) p { margin-top: 0; margin-bottom: 0; }

        /* --- 藝術畫廊圖片外框 (Art Frame) --- */
        .feature-img-wrapper { 
            position: relative; z-index: 2; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; align-self: center; 
        }
        .art-frame {
            position: relative; padding: 0.8vw; background: #ffffff; border: 1px solid #eee;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); display: inline-block; 
            max-width: 100%; max-height: 65vh; 
        }
        .art-frame::before { content: ''; position: absolute; inset: 4px; border: 1px solid rgba(0,0,0,0.06); pointer-events: none; }
        .art-frame img { display: block; max-width: 100%; max-height: calc(65vh - 2vw); object-fit: contain; }

        /* --- 佈局網格配置 --- */
        .layout-standard .text-content-wrapper { grid-column: 2 / 12; }
        .layout-indent .text-content-wrapper { grid-column: 3 / 11; }
        .layout-split-left-img .feature-img-wrapper { grid-column: 1 / 6; }
        .layout-split-left-img .text-content-wrapper { grid-column: 7 / 13; }
        .layout-split-right-img .text-content-wrapper { grid-column: 1 / 7; }
        .layout-split-right-img .feature-img-wrapper { grid-column: 8 / 13; }

        .slide-number-indicator { position: absolute; bottom: 2vw; right: 3vw; font-size: 1.1rem; font-family: 'Cinzel', serif; color: #999; letter-spacing: 3px; z-index: 3; pointer-events: none; }

        /* --- 控制項與 UI --- */
        .controls-container { position: absolute; bottom: 2.5rem; display: flex; align-items: center; gap: 2rem; }
        .icon-btn { background: transparent; border: none; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; color: #aaa; }
        .icon-btn:hover { color: #111; }
        .icon-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
        .slide-counter { font-size: 0.8rem; font-family: 'Inter', sans-serif; font-weight: 300; color: #888; font-variant-numeric: tabular-nums; letter-spacing: 1px;}

        .loader { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(5px); z-index: 100; flex-direction: column; justify-content: center; align-items: center; gap: 15px;}
        .spinner { width: 40px; height: 40px; border: 1px solid rgba(0,0,0,0.1); border-top-color: #111; border-radius: 50%; animation: spin 1s linear infinite; }
        .loader-text { font-size: 0.85rem; font-weight: 300; font-family: 'Inter', sans-serif; color: #666; letter-spacing: 2px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; opacity: 0.15;}
        .empty-state svg { width: 100px; height: 100px; stroke: #111; stroke-width: 0.5; fill: none; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 0.5; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } }
        
        .action-bar { position: absolute; top: 2rem; right: 2.5rem; display: flex; align-items: center; gap: 15px; }
        .btn-export { background: #fff; border: 1px solid #ddd; padding: 6px 12px; font-size: 0.75rem; font-family: 'Cinzel', serif; letter-spacing: 2px; cursor: pointer; transition: 0.2s; color: #666; border-radius: 4px; }
        .btn-export:hover { border-color: #111; color: #111; }

        .opacity-control { display: flex; align-items: center; gap: 8px; border-right: 1px solid #eee; padding-right: 15px;}
        .opacity-control svg { width: 14px; height: 14px; color: #999; }
        input[type=range] { -webkit-appearance: none; width: 60px; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #ddd; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 10px; border-radius: 50%; background: #666; margin-top: -4px; transition: 0.2s; }
        input[type=range]:hover::-webkit-slider-thumb { background: #111; transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">AURA</div>
        
        <div class="toolbar">
            <!-- 插入分頁標記按鈕 -->
            <div class="icon-toggle" id="pageBreakBtn" title="插入圖形分頁標記 (強制從此處分頁)">
                <svg viewBox="0 0 24 24"><path d="M5 12h14M8 7l-3 5 3 5m8-10l3 5-3 5" stroke-width="2"></path></svg>
            </div>

            <div class="icon-toggle active-mode" id="titleToggle" style="display: flex;" title="開啟/關閉自動產生標題">
                <svg id="icon-title-on" viewBox="0 0 24 24" style="display: none;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="7" y1="8" x2="17" y2="8" stroke-width="2.5"></line><line x1="7" y1="13" x2="17" y2="13"></line><line x1="7" y1="17" x2="13" y2="17"></line></svg>
                <svg id="icon-title-off" viewBox="0 0 24 24" style="display: block;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="7" y1="9" x2="17" y2="9"></line><line x1="7" y1="13" x2="17" y2="13"></line><line x1="7" y1="17" x2="13" y2="17"></line></svg>
            </div>

            <div class="icon-toggle" id="modeToggle" title="切換 AI智慧排版 / 嚴格一字不易">
                <svg id="icon-magic" viewBox="0 0 24 24" style="display:none;"><path d="M21 16.052v-.004A9.965 9.965 0 0022 12c0-5.523-4.477-10-10-10S2 6.477 2 12s4.477 10 10 10c1.72 0 3.336-.434 4.757-1.189l4.53 1.51-1.34-4.269zM12 7v10M7 12h10"/></svg>
                <svg id="icon-lock" viewBox="0 0 24 24" style="display:block;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
        </div>

        <div class="editor-wrapper">
            <div id="promptInput" contenteditable="true" data-placeholder="輸入需排版的原文或段落...也可以點擊上方按鍵插入分頁。"></div>
        </div>
        <button id="generateBtn" class="btn">GENERATE</button>
    </div>

    <div class="main-content">
        <div class="action-bar" id="actionBar" style="display: none;">
            <div class="opacity-control" title="調整背景濃度">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20v-20z" fill="currentColor" opacity="0.3"/></svg>
                <input type="range" id="opacitySlider" min="0" max="100" value="20">
            </div>
            <button id="btnExportHtml" class="btn-export">HTML</button>
            <button id="btnExportPptx" class="btn-export">PPTX</button>
        </div>

        <div class="presentation-wrapper" id="presentationBoard">
            <div class="empty-state">
                <svg viewBox="0 0 100 100"><rect x="15" y="25" width="70" height="50" rx="1" ry="1"></rect><line x1="25" y1="40" x2="60" y2="40"></line><line x1="25" y1="50" x2="75" y2="50"></line><line x1="25" y1="60" x2="50" y2="60"></line></svg>
            </div>
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div class="loader-text" id="loaderText">內容生成排版中...</div>
            </div>
        </div>

        <div class="controls-container" id="controls" style="display: none;">
            <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
            <div class="slide-counter"><span id="currentSlideNum">0</span> / <span id="totalSlideNum">0</span></div>
            <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        </div>
    </div>

    <script>
        const API_KEYS = ["pk_eFlNmo9v1lXOC6Zw"];
        let currentApiKeyIndex = 0;
        const API_URL = "https://gen.pollinations.ai/v1/chat/completions";
        const MODEL = "gemini-search";

        const generateBtn = document.getElementById('generateBtn');
        const promptInput = document.getElementById('promptInput');
        const presentationBoard = document.getElementById('presentationBoard');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loaderText');
        const controls = document.getElementById('controls');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentSlideNum = document.getElementById('currentSlideNum');
        const totalSlideNum = document.getElementById('totalSlideNum');
        const actionBar = document.getElementById('actionBar');
        const opacitySlider = document.getElementById('opacitySlider');
        const pageBreakBtn = document.getElementById('pageBreakBtn');
        
        let isAiMode = false;
        let useTitleInStrict = false;
        let slides = [];
        let currentIndex = 0;

        opacitySlider.addEventListener('input', (e) => {
            const val = e.target.value;
            const opacity = 0.02 + (val / 100) * 0.23;
            document.documentElement.style.setProperty('--bg-opacity', opacity.toFixed(3));
        });

        document.getElementById('modeToggle').addEventListener('click', function() {
            isAiMode = !isAiMode;
            document.getElementById('icon-magic').style.display = isAiMode ? "block" : "none";
            document.getElementById('icon-lock').style.display = isAiMode ? "none" : "block";
            isAiMode ? this.classList.add('active-mode') : this.classList.remove('active-mode');
        });

        document.getElementById('titleToggle').addEventListener('click', function() {
            useTitleInStrict = !useTitleInStrict;
            document.getElementById('icon-title-on').style.display = useTitleInStrict ? "block" : "none";
            document.getElementById('icon-title-off').style.display = useTitleInStrict ? "none" : "block";
            useTitleInStrict ? this.classList.remove('active-mode') : this.classList.add('active-mode');
        });

        // 避免點擊按鈕時輸入框失去焦點，以便保留游標位置
        pageBreakBtn.addEventListener('mousedown', (e) => e.preventDefault());

        // 嚴格精準插入分頁標記，避免重複插入的問題
        pageBreakBtn.addEventListener('click', () => {
            promptInput.focus();
            
            const selection = window.getSelection();
            // 確認游標是否真實存在於輸入框內部
            if (selection.rangeCount > 0 && promptInput.contains(selection.anchorNode)) {
                const range = selection.getRangeAt(0);
                range.deleteContents(); // 若有反白文字則先刪除
                
                // 建立標記節點
                const markerDiv = document.createElement('div');
                markerDiv.className = 'page-break-line';
                markerDiv.contentEditable = 'false';
                markerDiv.innerHTML = '<span>✦</span> 分頁標記 <span>✦</span>';
                
                // 建立換行節點 (方便用戶繼續往下打字)
                const brDiv = document.createElement('div');
                brDiv.innerHTML = '<br>';
                
                // 透過 Range API 精準插入 (順序：先插換行，再插標記，游標就會在換行處)
                range.insertNode(brDiv);
                range.insertNode(markerDiv);
                
                // 將游標強迫移動到新建立的換行內部
                range.setStart(brDiv, 0);
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
                
                // 畫面自動滾動至標記處
                markerDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                // 如果目前沒有游標 (例如一開始還沒點擊輸入框)，則確實只加在最尾端
                const markerHTML = `<div class="page-break-line" contenteditable="false"><span>✦</span> 分頁標記 <span>✦</span></div><div><br></div>`;
                promptInput.insertAdjacentHTML('beforeend', markerHTML);
                promptInput.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        function splitIntoChunks(text, maxLength = 110) {
            const sentences = text.split(/([。！？.!?\n])/); 
            let mergedSentences = [];
            for (let i = 0; i < sentences.length; i += 2) {
                let s = sentences[i];
                let punc = sentences[i + 1] || "";
                if (s + punc) mergedSentences.push(s + punc);
            }
            let chunks = [], currentChunk = "";
            for (let s of mergedSentences) {
                s = s.trim();
                if (!s) continue;
                if (currentChunk.length + s.length <= maxLength) currentChunk += (currentChunk ? " " : "") + s;
                else {
                    if (currentChunk) chunks.push(currentChunk);
                    currentChunk = s;
                }
            }
            if (currentChunk) chunks.push(currentChunk);
            return chunks;
        }

        // --- 全新圖片抓取邏輯 (強制合併：主標題 + 本頁片段) ---
        function getHighResUniqueImageUrl(mainTopic, textSnippet, index) {
            // 1. 提取並清理主標題 (確保整個簡報不偏題，取前15個字)
            let cleanMain = (mainTopic || "藝術").replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s]/g, ' ').trim().substring(0, 15);
            
            // 2. 提取並清理當前頁面片段 (確保符合單頁語境，取前15個字)
            let cleanSnippet = "";
            if (textSnippet && textSnippet.length > 2) {
                cleanSnippet = textSnippet.replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s]/g, ' ').trim().substring(0, 15);
            }

            // 3. 組合兩者作為最終關鍵字 (若兩者雷同則避免重複累贅)
            let queryPhrase = cleanMain;
            if (cleanSnippet && !cleanMain.includes(cleanSnippet) && !cleanSnippet.includes(cleanMain)) {
                queryPhrase = `${cleanMain} ${cleanSnippet}`;
            }

            // 4. 加入排除與美化參數，避免出現雜亂圖片
            let finalQuery = `${queryPhrase} 攝影 意境 -文字 -海報 -圖表 -字`.trim();
            
            let cacheBuster = Date.now() + "_" + Math.floor(Math.random() * 1000000);
            let tse = "tse" + ((index % 4) + 1);
            return `https://${tse}.mm.bing.net/th?q=${encodeURIComponent(finalQuery)}&w=1200&h=1200&c=7&rs=1&pid=Api&mkt=zh-TW&cb=${cacheBuster}&uid=${cacheBuster}`;
        }

        generateBtn.addEventListener('click', async () => {
            const rawHTML = promptInput.innerHTML.trim();
            if (!promptInput.innerText.trim() && !rawHTML) return;

            generateBtn.disabled = true;
            loader.style.display = "flex";
            controls.style.display = "none";
            actionBar.style.display = "none";

            try {
                let finalHtml = "";
                let chunks = [];
                let topicForImage = "藝術排版";

                // 解析手動分頁標記
                if (rawHTML.includes('page-break-line')) {
                    const parts = rawHTML.split(/<div class="page-break-line".*?<\/div>/gi);
                    const tempDiv = document.createElement('div');
                    parts.forEach(part => {
                        tempDiv.innerHTML = part.replace(/<br\s*\/?>/gi, '\n');
                        let text = tempDiv.innerText.trim();
                        if (text) {
                            let subChunks = splitIntoChunks(text, 110);
                            chunks.push(...subChunks);
                        }
                    });
                } else {
                    chunks = splitIntoChunks(promptInput.innerText.trim(), 110);
                }

                // 擴大抓取全篇第一句的字數作為全局主關鍵字
                if(chunks.length > 0) topicForImage = chunks[0].substring(0, 15).replace(/\n/g, ' ');

                if (!isAiMode) {
                    loaderText.innerText = "依循宋體文學排版中...";
                    
                    if (!useTitleInStrict) {
                        await new Promise(r => setTimeout(r, 400));
                        finalHtml = chunks.map(c => `<div class="slide"><p>${c.replace(/\n/g, '<br>')}</p></div>`).join("\n");
                    } else {
                        loaderText.innerText = "生成對應標題...";
                        const titlePrompt = `請為以下 ${chunks.length} 個段落，分別產生極短的繁體中文標題(不超過8個字)。請"只"輸出一個 JSON 陣列，例如: ["標題一", "標題二"]。`;
                        const titleContent = chunks.map((c, i) => `[段落 ${i+1}] ${c}`).join("\n\n");
                        
                        try {
                            const response = await fetch(API_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEYS[currentApiKeyIndex]}` },
                                body: JSON.stringify({
                                    model: MODEL,
                                    messages: [ { role: "system", content: titlePrompt }, { role: "user", content: titleContent } ]
                                })
                            });
                            const data = await response.json();
                            let aiResponse = data.choices[0].message.content.trim().replace(/```json/gi, '').replace(/```/gi, '').trim();
                            let titles = JSON.parse(aiResponse);
                            while(titles.length < chunks.length) titles.push(topicForImage);
                            finalHtml = chunks.map((c, i) => `<div class="slide"><h2>${titles[i]}</h2><p>${c.replace(/\n/g, '<br>')}</p></div>`).join("\n");
                        } catch(e) {
                            finalHtml = chunks.map((c, i) => `<div class="slide"><h2>章節 ${i+1}</h2><p>${c.replace(/\n/g, '<br>')}</p></div>`).join("\n");
                        }
                    }
                } else {
                    loaderText.innerText = "AI 整理與排版生成中...";
                    let textForAI = promptInput.innerHTML;
                    let tempDiv = document.createElement('div');
                    tempDiv.innerHTML = textForAI;
                    tempDiv.querySelectorAll('.page-break-line').forEach(el => el.innerText = '\n\n[MANUAL_PAGE_BREAK]\n\n');
                    
                    let systemPrompt = `You are a minimalist designer. Output ONLY valid HTML. 
                    RULES: 1. TRADITIONAL CHINESE ONLY. 
                    2. If you see [MANUAL_PAGE_BREAK], you MUST start a new slide at that exact point. Furthermore, if the text inside any block is too long, you MUST automatically split it into multiple slides to keep the presentation minimalist and uncluttered.
                    3. Format: <div class="slide"><h2>[Subtitle]</h2><p>[Text]</p></div>`;
                    
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEYS[currentApiKeyIndex]}` },
                        body: JSON.stringify({
                            model: MODEL,
                            messages: [ { role: "system", content: systemPrompt }, { role: "user", content: tempDiv.innerText } ]
                        })
                    });
                    const data = await response.json();
                    finalHtml = data.choices[0].message.content.replace(/```html/gi, '').replace(/```/gi, '').trim();
                }

                renderPresentation(finalHtml, topicForImage);

            } catch (error) {
                console.error(error);
                presentationBoard.innerHTML = `<div class="empty-state"><p style="color:#aaa;">發生錯誤，請稍後再試</p></div>`;
            } finally {
                generateBtn.disabled = false;
                loader.style.display = "none";
            }
        });

        function renderPresentation(htmlContent, mainTopic) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;
            
            const layoutSequence = ['layout-standard', 'layout-split-right-img', 'layout-indent', 'layout-split-left-img'];
            const rawSlides = tempDiv.querySelectorAll('.slide');
            presentationBoard.innerHTML = '';

            rawSlides.forEach((slide, index) => {
                const newSlide = document.createElement('div');
                const assignedLayout = layoutSequence[index % layoutSequence.length];
                newSlide.className = `slide ${assignedLayout}`;

                const bgImg = document.createElement('img');
                bgImg.className = 'bg-img';
                bgImg.crossOrigin = "Anonymous";
                bgImg.src = `https://picsum.photos/seed/${Math.floor(Math.random() * 99999)}/1600/900`;
                newSlide.appendChild(bgImg);

                const textWrapper = document.createElement('div');
                textWrapper.className = 'text-content-wrapper';
                const scrollArea = document.createElement('div');
                scrollArea.className = 'text-inner-scroll';

                const h1 = slide.querySelector('h1');
                const h2 = slide.querySelector('h2');
                const p = slide.querySelector('p');
                const ul = slide.querySelector('ul');

                if(h1) scrollArea.appendChild(h1.cloneNode(true));
                if(h2) scrollArea.appendChild(h2.cloneNode(true));
                if(p) scrollArea.appendChild(p.cloneNode(true));
                if(ul) scrollArea.appendChild(ul.cloneNode(true));

                textWrapper.appendChild(scrollArea);
                newSlide.appendChild(textWrapper);

                if (assignedLayout.includes('img')) {
                    const textSnippet = p ? p.innerText : "";
                    const bingImageUrl = getHighResUniqueImageUrl(mainTopic, textSnippet, index);

                    const imgWrapper = document.createElement('div');
                    imgWrapper.className = 'feature-img-wrapper';
                    const artFrame = document.createElement('div');
                    artFrame.className = 'art-frame';
                    const featureImg = document.createElement('img');
                    featureImg.crossOrigin = "anonymous";
                    featureImg.src = bingImageUrl;
                    featureImg.onerror = function() { this.src = `https://picsum.photos/seed/fb${Math.floor(Math.random()*999)}/800/600`; };
                    
                    artFrame.appendChild(featureImg);
                    imgWrapper.appendChild(artFrame);
                    newSlide.appendChild(imgWrapper);
                }

                const pageNum = document.createElement('div');
                pageNum.className = 'slide-number-indicator';
                pageNum.innerText = String(index + 1).padStart(2, '0');
                newSlide.appendChild(pageNum);

                presentationBoard.appendChild(newSlide);
            });

            presentationBoard.appendChild(loader);
            slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;

            currentIndex = 0;
            updateSlides();
            controls.style.display = "flex";
            actionBar.style.display = "flex";
            totalSlideNum.innerText = slides.length;
        }

        function updateSlides() {
            slides.forEach((s, i) => s.classList.toggle('active', i === currentIndex));
            currentSlideNum.innerText = currentIndex + 1;
        }

        prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; updateSlides(); } });
        nextBtn.addEventListener('click', () => { if (currentIndex < slides.length - 1) { currentIndex++; updateSlides(); } });
        document.addEventListener('keydown', (e) => {
            if (slides.length === 0) return;
            if (e.key === 'ArrowRight' && currentIndex < slides.length - 1) { currentIndex++; updateSlides(); }
            if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; updateSlides(); }
        });

        // --- 匯出 HTML (同步採用最新防擠壓與置中對齊網格設定) ---
        document.getElementById('btnExportHtml').addEventListener('click', () => {
            const currentOpacity = getComputedStyle(document.documentElement).getPropertyValue('--bg-opacity').trim();
            const slideHtml = Array.from(slides).map(s => s.outerHTML).join('\n');
            const exportHtml = `<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><title>AURA Presentation</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Noto+Serif+TC:wght@300;400;500;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', 'Noto Serif TC', serif; margin: 0; background: #fff; overflow: hidden; }
    .wrapper { width: 100vw; height: 100vh; position: relative; }
    .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; display: grid; grid-template-columns: repeat(12, 1fr); align-items: center; gap: 2vw; padding: 4vw 5vw; box-sizing: border-box; overflow: hidden; }
    .slide.active { opacity: 1; z-index: 10; }
    .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: ${currentOpacity}; filter: grayscale(100%); z-index: 1; }
    
    .text-content-wrapper { position: relative; z-index: 2; width: 100%; max-height: 70vh; height: fit-content; align-self: center; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(0, 0, 0, 0.08); padding: 3vw 3.5vw; box-shadow: 0 15px 40px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
    .text-content-wrapper::before, .text-content-wrapper::after { content: ''; position: absolute; width: 15px; height: 15px; border: 1px solid rgba(0,0,0,0.3); }
    .text-content-wrapper::before { top: 12px; left: 12px; border-right: none; border-bottom: none; }
    .text-content-wrapper::after { bottom: 12px; right: 12px; border-left: none; border-top: none; }
    .text-inner-scroll { overflow-y: auto; padding-right: 15px; }
    .text-inner-scroll::-webkit-scrollbar { width: 4px; } .text-inner-scroll::-webkit-scrollbar-thumb { background: #dcdcdc; border-radius: 4px; }
    
    h1, h2 { margin: 0; text-align: left; }
    h1 { font-size: clamp(3rem, 5vw, 4.5rem); font-weight: 500; color: #111; margin-bottom: 0.5rem;}
    h2 { font-size: clamp(2rem, 3vw, 3rem); font-weight: 400; color: #666; letter-spacing: 4px;}
    p { font-size: clamp(1.4rem, 1.8vw, 1.8rem); line-height: 2.1; color: #333; margin-top: 1rem; font-weight: 300; text-align: left; }
    .text-inner-scroll:not(:has(h1)):not(:has(h2)) p { margin-top: 0; margin-bottom: 0; }
    
    .feature-img-wrapper { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; align-self: center; }
    .art-frame { position: relative; padding: 0.8vw; background: #fff; border: 1px solid #eee; box-shadow: 0 15px 45px rgba(0,0,0,0.1); display: inline-block; max-height: 65vh; }
    .art-frame::before { content: ''; position: absolute; inset: 4px; border: 1px solid rgba(0,0,0,0.06); }
    .art-frame img { display: block; max-width: 100%; max-height: calc(65vh - 2vw); object-fit: contain; }

    .layout-standard .text-content-wrapper { grid-column: 2 / 12; }
    .layout-indent .text-content-wrapper { grid-column: 3 / 11; }
    .layout-split-left-img .feature-img-wrapper { grid-column: 1 / 6; }
    .layout-split-left-img .text-content-wrapper { grid-column: 7 / 13; }
    .layout-split-right-img .text-content-wrapper { grid-column: 1 / 7; }
    .layout-split-right-img .feature-img-wrapper { grid-column: 8 / 13; }

    .slide-number-indicator { position: absolute; bottom: 2vw; right: 3vw; font-size: 1.2rem; font-family: 'Cinzel', serif; color: #999; letter-spacing: 3px; z-index: 3; }
    .ui-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; align-items: center; gap: 20px; }
    .icon-btn { background: transparent; border: none; width: 40px; height: 40px; cursor: pointer; color: #aaa; display: flex; justify-content: center; align-items: center; transition: 0.2s;}
    .icon-btn:hover { color: #111; } .icon-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1; }
    .counter { font-size: 0.85rem; font-family: 'Inter', sans-serif; color: #888; font-variant-numeric: tabular-nums; letter-spacing: 1px;}
</style></head><body>
<div class="wrapper" id="board">${slideHtml}</div>
<div class="ui-bar">
    <button class="icon-btn" id="btn-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
    <div class="counter"><span id="num-curr">1</span> / <span id="num-tot">0</span></div>
    <button class="icon-btn" id="btn-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
</div>
<script>
    const slides = document.querySelectorAll('.slide');
    const currEl = document.getElementById('num-curr');
    document.getElementById('num-tot').innerText = slides.length;
    let c = 0;
    function update() { slides.forEach((s, i) => s.classList.toggle('active', i === c)); currEl.innerText = c + 1; }
    if(slides.length > 0) update();
    document.getElementById('btn-prev').addEventListener('click', (e) => { e.stopPropagation(); if(c > 0) { c--; update(); }});
    document.getElementById('btn-next').addEventListener('click', (e) => { e.stopPropagation(); if(c < slides.length - 1) { c++; update(); }});
    document.addEventListener('keydown', (e) => { if(e.key === 'ArrowRight' && c < slides.length - 1) { c++; update(); } if(e.key === 'ArrowLeft' && c > 0) { c--; update(); }});
<\/script></body></html>`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([exportHtml], { type: 'text/html' }));
            a.download = 'AURA_Presentation.html';
            a.click();
        });

        // --- 匯出 PPTX (邏輯受嚴格保護，完全不改動) ---
        document.getElementById('btnExportPptx').addEventListener('click', () => {
            if(typeof PptxGenJS === 'undefined') { alert("PPT 引擎載入中，請稍後再試。"); return; }
            let pres = new PptxGenJS(); pres.layout = 'LAYOUT_16x9';
            const presentationFont = 'Noto Serif TC';
            const pptxTransparency = 100 - (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--bg-opacity').trim()) * 100);

            slides.forEach((slide, index) => {
                let pptSlide = pres.addSlide();
                let bgImg = slide.querySelector('.bg-img');
                if (bgImg) pptSlide.addImage({ path: bgImg.src, x: 0, y: 0, w: '100%', h: '100%', transparency: pptxTransparency }); 
                
                let boxX = 0.8, boxW = 8.4, textW = 7.6, imgX = 0, imgW = 0;
                let cList = slide.classList;

                // 配置版型區域
                if (cList.contains('layout-indent')) { boxX = 1.8; boxW = 6.4; textW = 5.6; } 
                else if (cList.contains('layout-split-left-img')) { boxX = 5.2; boxW = 4.4; textW = 3.8; imgX = 0.5; imgW = 4.2; } 
                else if (cList.contains('layout-split-right-img')) { boxX = 0.4; boxW = 4.4; textW = 3.8; imgX = 5.3; imgW = 4.2; }

                // 畫文字盛放背景 (微透明矩形模擬)
                pptSlide.addShape(pres.ShapeType.rect, { x: boxX, y: 0.8, w: boxW, h: 4.0, fill: { color: 'FFFFFF', transparency: 15 }, line: { color: 'CCCCCC', width: 1 } });
                
                // 畫圖片框架 (純白底框)
                let featureImg = slide.querySelector('.feature-img-wrapper img');
                if (featureImg && imgW > 0) {
                    pptSlide.addShape(pres.ShapeType.rect, { x: imgX, y: 0.6, w: imgW, h: 4.4, fill: { color: 'FFFFFF' }, shadow: { type: 'outer', opacity: 0.2, blur: 5 }});
                    try { pptSlide.addImage({ path: featureImg.src, x: imgX + 0.1, y: 0.7, sizing: { type: 'contain', w: imgW - 0.2, h: 4.2 } }); } catch(e){}
                }

                let h1 = slide.querySelector('h1'), h2 = slide.querySelector('h2'), p = slide.querySelector('p');
                let curY = 1.2;
                
                if(h1) { pptSlide.addText(h1.innerText, { x: boxX + 0.4, y: curY, w: textW, h:0.6, align: 'left', fontFace: presentationFont, fontSize: 36, color: '111111' }); curY += 0.7; }
                if(h2) { pptSlide.addText(h2.innerText, { x: boxX + 0.4, y: curY, w: textW, h:0.5, align: 'left', fontFace: presentationFont, fontSize: 24, color: '666666' }); curY += 0.5; }
                if(p) { pptSlide.addText(p.innerText, { x: boxX + 0.4, y: curY, w: textW, h: 4.2 - curY, align: 'left', valign: 'top', fontFace: presentationFont, fontSize: 18, color: '333333', lineSpacing: 30 }); }

                pptSlide.addText(String(index + 1).padStart(2, '0'), { x: 9.0, y: 5.1, w: 0.8, h: 0.4, align: 'right', fontFace: 'Cinzel', fontSize: 16, color: '999999' });
            });
            pres.writeFile({ fileName: "AURA_Presentation.pptx" });
        });
    </script>
</body>
</html>
